name: strongR-frida

on:
  schedule:
    - cron: "0 0 * * *" # Раз в сутки
  workflow_dispatch:

permissions:
  contents: write

jobs: 
  check_version:
    runs-on: ubuntu-latest
    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
      ALREADY_RELEASE: ${{ steps.checkReleaseVersion.outputs.ALREADY_RELEASE }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            });
            core.setOutput('FRIDA_VERSION', release.data.tag_name);

      - name: Check if already released
        id: checkReleaseVersion
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}'
              });
              core.setOutput('ALREADY_RELEASE', '1');
            } catch (e) {
              core.setOutput('ALREADY_RELEASE', '0');
            }

  build_android:
    needs: check_version
    if: needs.check_version.outputs.ALREADY_RELEASE == '0'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ninja-build pkg-config gcc-multilib g++-multilib \
            lib32stdc++-9-dev flex bison python3-pip
          pip3 install lief setuptools

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      - name: Build strongR-Frida
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # Настройка Git
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Клонируем оригинальную Фриду
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          
          # Клонируем патчи (используем секрет PATCH_REPO)
          git clone ${{ secrets.PATCH_REPO }} ../Patchs
          
          # Применяем патчи
          # Важно: путь к патчам должен соответствовать структуре вашего репозитория патчей
          for d in ../Patchs/strongR-frida/*; do
            if [ -d "$d" ]; then
              subproject=$(basename "$d")
              echo "Applying patches to subprojects/$subproject"
              cd subprojects/$subproject
              git am ../../../Patchs/strongR-frida/$subproject/*.patch || exit 1
              cd ../..
            fi
          done

          # Сборка под все архитектуры
          # Используем внутренние мейкфайлы фриды (это надежнее)
          make server-android-arm -j$(nproc)
          make server-android-arm64 -j$(nproc)
          make server-android-x86 -j$(nproc)
          make server-android-x86_64 -j$(nproc)
          
          # Собираем и гаджеты, если нужно
          make gadget-android-arm -j$(nproc)
          make gadget-android-arm64 -j$(nproc)

      - name: Prepare assets
        run: |
          mkdir -p output
          VER=${{ needs.check_version.outputs.FRIDA_VERSION }}
          
          # Собираем файлы из папок сборки Frida
          # Пути могут меняться в зависимости от версии Frida, обычно это build/frida-android-arm...
          cp frida/build/frida-android-arm/bin/frida-server output/hluda-server-$VER-android-arm
          cp frida/build/frida-android-arm64/bin/frida-server output/hluda-server-$VER-android-arm64
          cp frida/build/frida-android-x86/bin/frida-server output/hluda-server-$VER-android-x86
          cp frida/build/frida-android-x86_64/bin/frida-server output/hluda-server-$VER-android-x86_64
          
          cp frida/build/frida-android-arm/lib/frida/32/frida-gadget.so output/hluda-gadget-$VER-android-arm.so
          cp frida/build/frida-android-arm64/lib/frida/64/frida-gadget.so output/hluda-gadget-$VER-android-arm64.so

          gzip output/*

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check_version.outputs.FRIDA_VERSION }}
          name: strongR-frida ${{ needs.check_version.outputs.FRIDA_VERSION }}
          files: output/*.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
