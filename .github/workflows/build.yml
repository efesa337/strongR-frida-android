name: strongR-frida-AUTO

on:
  workflow_dispatch:

permissions:
  contents: write

jobs: 
  build_android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ninja-build pkg-config gcc-multilib g++-multilib \
            lib32stdc++-9-dev flex bison python3-pip curl
          pip3 install lief setuptools

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      - name: Build and Patch Frida
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # 1. Получаем актуальную версию
          FRIDA_VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "FRIDA_VER=$FRIDA_VERSION" >> $GITHUB_ENV
          
          # 2. Клонируем Фриду
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida

          # 3. «ЖЕСТКИЙ» ПАТЧИНГ (sed вместо кривых файлов патчей)
          echo "Запускаю автоматический патчинг строк..."
          
          # Меняем название проекта и пайпов (основные детекты)
          find . -type f -not -path '*/.*' -exec sed -i 's/frida/hluda/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/Frida/Hluda/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/re.frida.server/re.hluda.server/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/gum-js-loop/gum-js-poll/g' {} +
          find . -type f -not -path '*/.*' -exec sed -i 's/gmain/hmain/g' {} +
          
          echo "Патчинг завершен успешно."

          # 4. СБОРКА (Используем правильные команды)
          export PATH=$PATH:$ANDROID_NDK_ROOT
          
          # Исправляем возможные проблемы с конфигурацией
          python3 releng/setup-env.py --host=android-arm64
          
          echo "Начинаю сборку серверов..."
          make server-android-arm -j$(nproc)
          make server-android-arm64 -j$(nproc)
          make server-android-x86 -j$(nproc)
          make server-android-x86_64 -j$(nproc)
          
          echo "Начинаю сборку гаджетов..."
          make gadget-android-arm -j$(nproc)
          make gadget-android-arm64 -j$(nproc)

      - name: Prepare assets
        run: |
          mkdir -p output
          VER=${{ env.FRIDA_VER }}
          
          # Копируем всё что скомпилилось
          find frida/build/ -name "frida-server" | while read line; do
            arch=$(echo $line | cut -d'/' -f3 | cut -d'-' -f3-)
            cp "$line" "output/hluda-server-$VER-android-$arch"
          done
          
          find frida/build/ -name "frida-gadget.so" | while read line; do
            arch=$(echo $line | cut -d'/' -f3 | cut -d'-' -f3-)
            cp "$line" "output/hluda-gadget-$VER-android-$arch.so"
          done

          gzip output/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FRIDA_VER }}
          name: strongR-frida-${{ env.FRIDA_VER }}
          files: output/*.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
