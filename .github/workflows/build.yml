name: strongR-frida

on:
  workflow_dispatch: # Запуск кнопкой

permissions:
  contents: write

jobs: 
  build_android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ninja-build pkg-config gcc-multilib g++-multilib \
            lib32stdc++-9-dev flex bison python3-pip curl
          pip3 install lief setuptools

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      - name: Build strongR-Frida
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Получаем версию Frida
          FRIDA_VERSION=$(curl -s https://api.github.com/repos/frida/frida/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "FRIDA_VER=$FRIDA_VERSION" >> $GITHUB_ENV
          echo "Building Frida $FRIDA_VERSION"

          # КЛОНИРУЕМ РЕПОЗИТОРИЙ С ТВОЕГО СКРИНШОТА
          git clone https://github.com/hluwa/Patchs.git ./PatchRepo
          
          # КЛОНИРУЕМ ФРИДУ
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          
          # ПРИМЕНЯЕМ ПАТЧИ ИЗ hluwa/Patchs/strongR-frida
          echo "Applying patches..."
          # Патчи лежат в PatchRepo/strongR-frida/название_проекта
          for d in ../PatchRepo/strongR-frida/*; do
            if [ -d "$d" ]; then
              subproject=$(basename "$d")
              echo "Checking subproject: $subproject"
              if [ -d "subprojects/$subproject" ]; then
                echo "Patching subprojects/$subproject"
                cd subprojects/$subproject
                # Применяем все .patch файлы из этой папки
                git am ../../../PatchRepo/strongR-frida/$subproject/*.patch || echo "Some patches failed to apply, skipping conflicts..."
                cd ../..
              fi
            fi
          done

          # СБОРКА
          export PATH=$PATH:$ANDROID_NDK_ROOT
          
          # Сборка серверов
          make server-android-arm -j$(nproc)
          make server-android-arm64 -j$(nproc)
          make server-android-x86 -j$(nproc)
          make server-android-x86_64 -j$(nproc)
          
          # Сборка гаджетов
          make gadget-android-arm -j$(nproc)
          make gadget-android-arm64 -j$(nproc)

      - name: Prepare assets
        run: |
          mkdir -p output
          VER=${{ env.FRIDA_VER }}
          
          # Собираем готовые файлы
          find frida/build/frida-android-arm/bin/ -name "frida-server" -exec cp {} output/hluda-server-$VER-android-arm \; || true
          find frida/build/frida-android-arm64/bin/ -name "frida-server" -exec cp {} output/hluda-server-$VER-android-arm64 \; || true
          find frida/build/frida-android-x86/bin/ -name "frida-server" -exec cp {} output/hluda-server-$VER-android-x86 \; || true
          find frida/build/frida-android-x86_64/bin/ -name "frida-server" -exec cp {} output/hluda-server-$VER-android-x86_64 \; || true
          
          find frida/build/frida-android-arm/lib/frida/32/ -name "frida-gadget.so" -exec cp {} output/hluda-gadget-$VER-android-arm.so \; || true
          find frida/build/frida-android-arm64/lib/frida/64/ -name "frida-gadget.so" -exec cp {} output/hluda-gadget-$VER-android-arm64.so \; || true

          gzip output/*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.FRIDA_VER }}
          name: strongR-frida-${{ env.FRIDA_VER }}
          files: output/*.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
