name: strongR-frida

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs: 
  check_version:
    runs-on: ubuntu-latest
    outputs:
      FRIDA_VERSION: ${{ steps.pullFridaLatestRelease.outputs.FRIDA_VERSION }}
    steps:
      - name: Pull Frida Latest Release
        id: pullFridaLatestRelease
        uses: actions/github-script@v7
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'frida',
              repo: 'frida',
            });
            core.setOutput('FRIDA_VERSION', release.data.tag_name);

  build_android:
    needs: check_version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git ninja-build pkg-config gcc-multilib g++-multilib \
            lib32stdc++-9-dev flex bison python3-pip
          pip3 install lief setuptools

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      - name: Build strongR-Frida
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Клонируем Фриду
          git clone --recurse-submodules https://github.com/frida/frida.git
          cd frida
          
          # Клонируем патчи
          git clone ${{ secrets.PATCH_REPO }} ../Patchs
          
          # Применяем патчи (если папки существуют)
          for d in ../Patchs/strongR-frida/*; do
            if [ -d "$d" ]; then
              subproject=$(basename "$d")
              echo "Applying patches to subprojects/$subproject"
              cd subprojects/$subproject
              git am ../../../Patchs/strongR-frida/$subproject/*.patch || echo "No patches for $subproject"
              cd ../..
            fi
          done

          # Сборка серверов (это займет 30-50 минут)
          export PATH=$PATH:$ANDROID_NDK_ROOT
          make server-android-arm -j$(nproc)
          make server-android-arm64 -j$(nproc)
          make server-android-x86 -j$(nproc)
          make server-android-x86_64 -j$(nproc)
          
          # Сборка гаджетов
          make gadget-android-arm -j$(nproc)
          make gadget-android-arm64 -j$(nproc)
          make gadget-android-x86 -j$(nproc)
          make gadget-android-x86_64 -j$(nproc)

      - name: Prepare assets
        run: |
          mkdir -p output
          VER=${{ needs.check_version.outputs.FRIDA_VERSION }}
          
          # Копируем бинарники из папок сборки
          # Серверы
          cp frida/build/frida-android-arm/bin/frida-server output/hluda-server-$VER-android-arm || true
          cp frida/build/frida-android-arm64/bin/frida-server output/hluda-server-$VER-android-arm64 || true
          cp frida/build/frida-android-x86/bin/frida-server output/hluda-server-$VER-android-x86 || true
          cp frida/build/frida-android-x86_64/bin/frida-server output/hluda-server-$VER-android-x86_64 || true
          
          # Гаджеты
          cp frida/build/frida-android-arm/lib/frida/32/frida-gadget.so output/hluda-gadget-$VER-android-arm.so || true
          cp frida/build/frida-android-arm64/lib/frida/64/frida-gadget.so output/hluda-gadget-$VER-android-arm64.so || true
          cp frida/build/frida-android-x86/lib/frida/32/frida-gadget.so output/hluda-gadget-$VER-android-x86.so || true
          cp frida/build/frida-android-x86_64/lib/frida/64/frida-gadget.so output/hluda-gadget-$VER-android-x86_64.so || true

          # Сжимаем всё в .gz
          gzip output/*

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check_version.outputs.FRIDA_VERSION }}
          name: strongR-frida-${{ needs.check_version.outputs.FRIDA_VERSION }}
          files: output/*.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
